<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora</title>
    <link rel="stylesheet" href="calculadora.css">
</head>
<body>
    <div class="container">
   <div class="calculadora">
    <h1>CALCULADORA</h1>
    <div class="display">
        <input id="lcd" type="text">
    </div>
   <div class="grid">
     <button id="b7">7</button>
     <button id="b8">8</button>
     <button id="b9">9</button>
     <button id="bmais">+</button>
     <button id="b4">4</button>
     <button id="b5">5</button>
     <button id="b6">6</button>
     <button id="bmenos">-</button>
     <button id="b1">1</button>
     <button id="b2">2</button>
     <button id="b3">3</button>
     <button id="bvezes">x</button>
     <button id="bC">C</button>
     <button id="b0">0</button>
     <button onclick="calcular()" id="bigual">=</button>
     <button id="bdividir">/</button>
   </div>
   </div>
   <script src="calculadora.js"></script>
</body>
</html>
